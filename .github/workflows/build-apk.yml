name: Build Android APK

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      buildRelease:
        type: boolean
        description: Build signed release APK
        required: false
        default: false

env:
  KEYSTORE_FILE: 'keystore.jks'
  KEYSTORE_PASSWORD: '${{ secrets.KEYSTORE_PASSWORD }}'
  KEY_ALIAS: '${{ secrets.KEY_ALIAS }}'
  KEY_PASSWORD: '${{ secrets.KEY_PASSWORD }}'
  GRADLE_USER_HOME: '.gradle'

jobs:
  validate:
    runs-on: ubuntu-latest
    name: Validate Build Configuration
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # 暂时跳过Gradle Wrapper验证（缺少wrapper jar）
      # - name: Check Gradle Wrapper
      #   uses: gradle/actions/wrapper-validation@v3

      # 暂时跳过依赖验证
      # - name: Check dependencies
      #   run: ./gradlew dependencies --write-verification-metadata sha256

  build:
    runs-on: ubuntu-latest
    needs: validate
    name: Build APK
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Cache Gradle wrapper
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/wrapper
            ~/.gradle/caches/jars-*
            ~/.gradle/caches/modules-*
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle.kts', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: workload-recorder-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 90

      - name: Build Release APK (unsigned)
        if: ${{ !github.event.inputs.buildRelease }}
        run: ./gradlew assembleRelease

      - name: Upload unsigned Release APK
        if: ${{ !github.event.inputs.buildRelease }}
        uses: actions/upload-artifact@v4
        with:
          name: workload-recorder-release-unsigned-apk
          path: app/build/outputs/apk/release/*.apk
          retention-days: 90

      - name: Setup Keystore for signed release
        if: ${{ github.event.inputs.buildRelease == 'true' && env.KEYSTORE_PASSWORD && env.KEY_ALIAS && env.KEY_PASSWORD }}
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > app/${{ env.KEYSTORE_FILE }}

      - name: Build Signed Release APK
        if: ${{ github.event.inputs.buildRelease == 'true' && env.KEYSTORE_PASSWORD && env.KEY_ALIAS && env.KEY_PASSWORD }}
        env:
          ORG_GRADLE_PROJECT_storeFile: ${{ env.KEYSTORE_FILE }}
          ORG_GRADLE_PROJECT_storePassword: ${{ secrets.KEYSTORE_PASSWORD }}
          ORG_GRADLE_PROJECT_keyAlias: ${{ secrets.KEY_ALIAS }}
          ORG_GRADLE_PROJECT_keyPassword: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleRelease

      - name: Upload Signed Release APK
        if: ${{ github.event.inputs.buildRelease == 'true' && env.KEYSTORE_PASSWORD && env.KEY_ALIAS && env.KEY_PASSWORD }}
        uses: actions/upload-artifact@v4
        with:
          name: workload-recorder-release-signed-apk
          path: app/build/outputs/apk/release/*.apk
          retention-days: 90

  release:
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    name: Create Release

    permissions:
      contents: write
      discussions: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4

      - name: Extract release notes
        id: release-notes
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}
          files: |
            workload-recorder-debug-apk/*.apk
            workload-recorder-release-unsigned-apk/*.apk
            workload-recorder-release-signed-apk/*.apk
          generate_release_notes: true

  build-success:
    needs: build
    if: always()
    runs-on: ubuntu-latest
    name: Build Status Notification
    steps:
      - name: Report build status
        run: |
          if [ "${{ needs.build.result }}" = "success" ]; then
            echo "✅ Build completed successfully!"
            echo "Download artifacts from: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          else
            echo "❌ Build failed!"
            exit 1
          fi
